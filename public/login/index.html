<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - TikTok Song Request</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../dashboard/style.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: radial-gradient(circle at top right, #1a1a2e 0%, var(--bg-body) 100%);
      font-family: var(--font-sans);
      color: var(--text);
      overflow: hidden;
    }
    
    /* Ornamen background */
    .bg-shape {
      position: absolute;
      width: 300px;
      height: 300px;
      background: var(--accent);
      filter: blur(100px);
      opacity: 0.15;
      border-radius: 50%;
      z-index: 0;
      animation: float 6s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-20px) scale(1.05); }
    }

    .login-card {
      position: relative;
      background: rgba(30, 30, 30, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: var(--radius);
      padding: 50px 40px;
      text-align: center;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 1;
      animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .login-card h1 {
      margin-top: 0;
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, #ffffff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 15px;
    }
    
    .login-card p {
      color: var(--text-muted);
      margin-bottom: 35px;
      line-height: 1.6;
      font-size: 0.95rem;
    }
    
    .btn-google {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #ffffff;
      color: #1a1a1a;
      border: none;
      padding: 14px 24px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    
    .btn-google:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255,255,255,0.15);
    }
    
    .btn-google:active {
      transform: translateY(0);
    }
    
    .btn-google img {
      width: 22px;
      height: 22px;
    }
  </style>
</head>
<body>
  
  <div class="bg-shape" style="top: -50px; left: -50px;"></div>
  <div class="bg-shape" style="bottom: -100px; right: -50px; background: #8800ff;"></div>

  <div class="login-card">
    <h1>TikTok Song Request</h1>
    <p>Silakan masuk menggunakan akun Google Anda untuk mengakses Dasbor dan mengatur antrian lagu.</p>
    
    <button id="login-btn" class="btn-google">
      <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google">
      Sign in with Google
    </button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const loginBtn = document.getElementById('login-btn');

    async function initAuth() {
      // 1. Ambil config dari server untuk mendapatkan Supabase Keys
      const res = await fetch('/api/config');
      const config = await res.json();

      if (!config.supabaseUrl || !config.supabaseKey) {
        alert('Supabase URL dan Key belum diatur di server (.env). Hubungi admin.');
        return;
      }

      // 2. Inisialisasi Supabase
      const supabase = window.supabase.createClient(config.supabaseUrl, config.supabaseKey);

      // Cek apakah user sudah login (jika iya, redirect langsung)
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        window.location.href = '/dashboard';
        return;
      }

      // 3. Pasang event listener tombol login
      loginBtn.addEventListener('click', async () => {
        loginBtn.textContent = 'Memuat...';
        loginBtn.disabled = true;

        const { error } = await supabase.auth.signInWithOAuth({
          provider: 'google',
          options: {
            redirectTo: window.location.origin + '/dashboard'
          }
        });

        if (error) {
          alert('Gagal login: ' + error.message);
          loginBtn.textContent = 'Sign in with Google';
          loginBtn.disabled = false;
        }
      });
    }

    initAuth();
  </script>
</body>
</html>
