<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - TikTok Song Request</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../dashboard/style.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: var(--bg);
      font-family: var(--font-sans);
      color: var(--text);
    }
    
    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px;
      text-align: center;
      width: 100%;
      max-width: 380px;
      box-shadow: none; /* No shadow for flat retro look */
    }
    
    .login-card-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--accent-dim);
      margin-bottom: 20px;
      display: inline-block;
      border-bottom: 1px dashed rgba(200, 242, 94, 0.3);
      padding-bottom: 5px;
      font-weight: 700;
    }

    .login-card h1 {
      margin-top: 0;
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
      font-family: var(--font-mono);
      letter-spacing: 1px;
      margin-bottom: 15px;
    }
    
    .login-card p {
      color: var(--text-dim);
      margin-bottom: 35px;
      line-height: 1.5;
      font-size: 12px;
      font-family: var(--font-mono);
    }
    
    .btn-google {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: var(--accent);
      color: #0d0d0d;
      border: 1px solid var(--accent);
      padding: 12px 24px;
      font-size: 12px;
      font-weight: 700;
      font-family: var(--font-mono);
      letter-spacing: 1px;
      border-radius: var(--radius);
      cursor: pointer;
      width: 100%;
      transition: var(--transition);
      outline: none;
    }
    
    .btn-google:hover {
      background: #d9ff70;
      border-color: #d9ff70;
    }
    
    .btn-google img {
      width: 18px;
      height: 18px;
    }
  </style>
</head>
<body>
  
  <div class="login-card">
    <div class="login-card-label">▌ AUTHENTICATION</div>
    <h1>TikTok Song Request</h1>
    <p>Silakan masuk menggunakan akun Google Anda untuk mengakses Dasbor dan mengatur antrian lagu.</p>
    
    <button id="login-btn" class="btn-google">
      <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google">
      Sign in with Google
    </button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const loginBtn = document.getElementById('login-btn');

    async function initAuth() {
      // 1. Ambil config dari server untuk mendapatkan Supabase Keys
      const res = await fetch('/api/config');
      const config = await res.json();

      if (!config.supabaseUrl || !config.supabaseKey) {
        alert('Supabase URL dan Key belum diatur di server (.env). Hubungi admin.');
        return;
      }

      // 2. Inisialisasi Supabase
      const supabase = window.supabase.createClient(config.supabaseUrl, config.supabaseKey);

      // Cek apakah user sudah login (jika iya, redirect langsung)
      // Gunakan onAuthStateChange agar memastikan session tersimpan dengan aman
      supabase.auth.onAuthStateChange((event, session) => {
        if (event === 'SIGNED_IN' || session) {
          window.location.href = '/dashboard';
        }
      });

      // Pengecekan awal fallback
      const { data } = await supabase.auth.getSession();
      if (data.session) {
        window.location.href = '/dashboard';
        return;
      }

      // 3. Pasang event listener tombol login
      loginBtn.addEventListener('click', async () => {
        loginBtn.textContent = 'Memuat...';
        loginBtn.disabled = true;

        const { error } = await supabase.auth.signInWithOAuth({
          provider: 'google',
          options: {
            redirectTo: window.location.origin + '/dashboard'
          }
        });

        if (error) {
          alert('Gagal login: ' + error.message);
          loginBtn.textContent = 'Sign in with Google';
          loginBtn.disabled = false;
        }
      });
    }

    initAuth();
  </script>
</body>
</html>
